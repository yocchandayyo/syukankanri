<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Habits" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="manifest" href="manifest.json?v=5" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="stylesheet" href="styles.css?v=5" />
  <title>Habits</title>
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="header-top">
        <div class="date" id="date"></div>
        <button class="settings-btn" id="settingsBtn" aria-label="設定">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>
      <h1 class="title">今日の習慣</h1>
      <div class="progress">
        <div class="progress-text">
          <span id="progressCount">0</span><span class="progress-divider">/</span><span id="progressTotal">0</span>
          <span class="progress-label">達成</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </div>
    </header>

    <section class="habits" id="habits"></section>

    <div class="empty" id="empty" hidden>
      <div class="empty-icon">✦</div>
      <p class="empty-text">習慣をはじめよう</p>
      <p class="empty-sub">下のボタンから追加できます</p>
    </div>

    <div class="spacer"></div>
  </main>

  <button class="fab" id="fabAdd" aria-label="習慣を追加">
    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
      <line x1="12" y1="5" x2="12" y2="19"></line>
      <line x1="5" y1="12" x2="19" y2="12"></line>
    </svg>
  </button>

  <div class="sheet-backdrop" id="sheetBackdrop"></div>
  <div class="sheet" id="sheet" aria-hidden="true">
    <div class="sheet-handle-wrap" id="sheetHandle">
      <div class="sheet-handle"></div>
    </div>
    <h2 class="sheet-title">新しい習慣</h2>
    <div class="emoji-picker" id="emojiPicker">
      <button type="button" class="emoji-option" data-emoji="✦">✦</button>
      <button type="button" class="emoji-option" data-emoji="◐">◐</button>
      <button type="button" class="emoji-option" data-emoji="☾">☾</button>
      <button type="button" class="emoji-option" data-emoji="❍">❍</button>
      <button type="button" class="emoji-option" data-emoji="✕">✕</button>
      <button type="button" class="emoji-option" data-emoji="✚">✚</button>
      <button type="button" class="emoji-option" data-emoji="△">△</button>
      <button type="button" class="emoji-option" data-emoji="▢">▢</button>
    </div>
    <input
      type="text"
      class="sheet-input"
      id="habitInput"
      placeholder="例: 瞑想 5分"
      maxlength="40"
      autocomplete="off"
    />
    <div class="sheet-actions">
      <button class="btn btn-ghost" id="cancelBtn">キャンセル</button>
      <button class="btn btn-primary" id="addBtn">追加する</button>
    </div>
  </div>

  <div class="sheet-backdrop" id="detailBackdrop"></div>
  <div class="sheet detail-sheet" id="detailSheet" aria-hidden="true">
    <div class="sheet-handle-wrap" id="detailHandle">
      <div class="sheet-handle"></div>
    </div>
    <div class="detail-header">
      <div class="detail-emoji" id="detailEmoji">✦</div>
      <h2 class="detail-title" id="detailTitle">習慣名</h2>
      <button class="edit-btn" id="editBtn" aria-label="編集">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"></path>
          <path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
        </svg>
      </button>
    </div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-num" id="statStreak">0</div>
        <div class="stat-label">連続</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statLongest">0</div>
        <div class="stat-label">最長</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">累計</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statRate">0%</div>
        <div class="stat-label">達成率</div>
      </div>
    </div>
    <div class="section-label">バッジ</div>
    <div class="milestones" id="milestones"></div>
    <div class="month-nav">
      <button class="month-btn" id="prevMonth" aria-label="前の月">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </button>
      <div class="month-label" id="monthLabel">2026年6月</div>
      <button class="month-btn" id="nextMonth" aria-label="次の月">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </button>
    </div>
    <div class="month-grid" id="monthGrid"></div>
    <div class="section-label">過去1年</div>
    <div class="year-scroll">
      <div class="year-months" id="yearMonths"></div>
      <div class="year-grid" id="yearGrid"></div>
    </div>
    <button class="btn btn-ghost detail-close" id="detailClose">閉じる</button>
  </div>

  <div class="confirm-backdrop" id="confirmBackdrop"></div>
  <div class="confirm" id="confirm">
    <p class="confirm-text" id="confirmText">この習慣を削除しますか？</p>
    <p class="confirm-sub">記録もすべて消えます</p>
    <div class="confirm-actions">
      <button class="btn btn-ghost" id="confirmCancel">キャンセル</button>
      <button class="btn btn-danger" id="confirmOk">削除</button>
    </div>
  </div>

  <div class="sheet-backdrop" id="settingsBackdrop"></div>
  <div class="sheet settings-sheet" id="settingsSheet" aria-hidden="true">
    <div class="sheet-handle-wrap" id="settingsHandle">
      <div class="sheet-handle"></div>
    </div>
    <h2 class="sheet-title">設定</h2>
    <div class="settings-section">
      <div class="settings-section-title">データのバックアップ</div>
      <p class="settings-desc">習慣と記録をJSONファイルで保存できます。iCloud Driveに入れておけば、機種変更や再インストール時に復元できます。</p>
      <button class="btn btn-ghost btn-block" id="exportBtn">バックアップを保存</button>
      <button class="btn btn-ghost btn-block" id="importBtn">バックアップから復元</button>
      <input type="file" id="importInput" accept=".json,application/json" hidden />
    </div>
    <div class="settings-section">
      <div class="settings-section-title">統計</div>
      <div class="settings-stats" id="settingsStats"></div>
    </div>
    <button class="btn btn-ghost btn-block settings-close" id="settingsClose">閉じる</button>
  </div>

  <div class="toast" id="toast" aria-live="polite"></div>

  <div class="version-tag" id="versionTag">v5</div>
  <script src="app.js?v=5"></script>
</body>
</html>
